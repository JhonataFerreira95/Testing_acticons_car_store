spring.application.name=LojaCarro

# URL do Banco de Dados (Corrigido de jdbcmysql para jdbc:mysql)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/loja_carro_db?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuracoes JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
