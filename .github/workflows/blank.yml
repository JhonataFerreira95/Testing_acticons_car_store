name: Java CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./TSI4M-LojaCarro-dev

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Run Tests
      run: mvn test

    - name: Run Mutation Tests (PIT)
      run: mvn org.pitest:pitest-maven:mutationCoverage

    - name: Upload PIT Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pit-mutation-report
        path: TSI4M-LojaCarro-dev/target/pit-reports/
        retention-days: 14