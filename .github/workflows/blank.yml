name: Java CI with MySQL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./TSI4M-LojaCarro-dev

  
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: lojacarros
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Run Tests
      run: mvn test
      env:
        SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/lojacarros
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: root

    - name: Run Mutation Tests (PIT)
      run: mvn org.pitest:pitest-maven:mutationCoverage
      env:
        SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/lojacarros
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: root

    - name: Upload PIT Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pit-mutation-report
        path: TSI4M-LojaCarro-dev/target/pit-reports/
        retention-days: 14